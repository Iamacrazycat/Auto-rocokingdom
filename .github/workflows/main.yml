name: Build and Auto Release

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka zstandard 
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
          # 确保核心依赖库存在
          pip install opencv-python numpy pywin32

      - name: Build with Nuitka
        run: |
          python -m nuitka --standalone `
            --assume-yes-for-downloads `
            --include-data-dir=templates=templates `
            --windows-console-mode=force `
            --output-dir=dist_folder `
            main.py

      - name: Generate Date Tag
        id: date
        run: |
          $date = Get-Date -Format "yyyy.M.d"
          echo "TAG_NAME=v$date" >> $env:GITHUB_ENV
          echo "RELEASE_NAME=Release v$date" >> $env:GITHUB_ENV

      - name: Package Output
        run: |
          Compress-Archive -Path dist_folder/main.dist/* -DestinationPath AutoRocoKingdom.zip

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          files: AutoRocoKingdom.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}